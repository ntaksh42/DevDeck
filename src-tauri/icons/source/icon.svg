<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F4C9E"/>
      <stop offset="1" stop-color="#0078D4"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#D9ECFF"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7FC4FF"/>
      <stop offset="1" stop-color="#3AA0FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#50E6FF"/>
      <stop offset="1" stop-color="#28C8F0"/>
    </linearGradient>
  </defs>

  <!-- rounded app background -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#bg)"/>

  <!-- deck of stacked cards -->
  <!-- back card -->
  <rect x="296" y="232" width="432" height="300" rx="40" fill="url(#card2)" opacity="0.9"
        transform="rotate(-9 512 382)"/>
  <!-- middle card -->
  <rect x="288" y="320" width="448" height="372" rx="44" fill="url(#accent)"
        transform="rotate(-3 512 506)"/>

  <!-- front card -->
  <rect x="284" y="404" width="456" height="392" rx="48" fill="url(#card1)"/>

  <!-- content rows on the front card (board lanes) -->
  <rect x="332" y="468" width="200" height="34" rx="17" fill="#0078D4"/>
  <rect x="332" y="540" width="360" height="26" rx="13" fill="#9DC9F2"/>
  <rect x="332" y="596" width="300" height="26" rx="13" fill="#9DC9F2"/>
  <rect x="332" y="652" width="340" height="26" rx="13" fill="#9DC9F2"/>
  <rect x="332" y="708" width="220" height="26" rx="13" fill="#9DC9F2"/>

  <!-- status check badge -->
  <circle cx="660" cy="700" r="62" fill="#2BB673"/>
  <path d="M632 700 L654 722 L692 678" stroke="#FFFFFF" stroke-width="20"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
